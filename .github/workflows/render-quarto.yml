name: Render Quarto (PR)

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R packages (no renv)
        if: ${{ hashFiles('renv.lock') == '' }}
        run: |
          Rscript -e 'pkgs <- readLines("r-packages.txt"); pkgs <- pkgs[nzchar(pkgs)]; install.packages(pkgs, repos="https://cloud.r-project.org")'

      - name: Restore renv
        if: ${{ hashFiles('renv.lock') != '' }}
        run: |
          Rscript -e 'install.packages("renv", repos="https://cloud.r-project.org")'
          Rscript -e 'renv::restore()'

      - name: Render site
        run: quarto render

      - name: Upload rendered site
        uses: actions/upload-artifact@v4
        with:
          name: rendered-site
          path: _site
